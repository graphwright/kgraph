site_name: Domain-Agnostic Knowledge Graph Server
site_description: Documentation for the domain-agnostic knowledge graph server
repo_url: https://github.com/wware/kgraph
repo_name: wware/kgraph

theme:
  name: null
  # variant options: 'modern' (new) or 'classic' (Material look)
  variant: modern

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview: overview.md
  - Architecture: architecture.md
  - Schema Design Guide: schema-design-guide.md
  - Pipeline: pipeline.md
  - Canonical IDs and Entity Resolution: canonical-ids-and-entity-resolution.md
  - Storage and Export: storage-and-export.md
  - Adapting to Your Domain: adapting-to-your-domain.md
  - Examples:
    - Medlit: examples/medlit.md
    - Sherlock: examples/sherlock.md
  - Deployment and Operations: deployment-and-operations.md
  - Contributing: contributing.md

