name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io/graphwright

jobs:
  # -------------------------------------------------------------------------
  # Build docs site and push all Docker images
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    environment: BuildEnv
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download book bundles
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/graphwright/books/releases/latest)
          get_url() {
            echo "$RELEASE" | python3 -c "
import sys, json, re
assets = json.load(sys.stdin)['assets']
pat = sys.argv[1]
matches = [a['browser_download_url'] for a in assets if re.search(pat, a['name'])]
print(matches[0] if matches else '')
" "$1"
          }

          for book in identity-book kg-book bfs-ql-book; do
            URL=$(get_url "^${book}-")
            if [ -z "$URL" ]; then
              echo "ERROR: failed to resolve ${book} release asset URL" >&2
              exit 1
            fi
            mkdir -p /tmp/${book}
            curl -fsSL "$URL" | tar -xz --strip-components=1 -C /tmp/${book}
          done

          mkdir -p deploy/books docs/identity-book docs/kg-book docs/bfs-ql-book
          cp /tmp/identity-book/text.pdf    deploy/books/the-identity-server.pdf
          cp /tmp/kg-book/text.pdf          deploy/books/knowledge-graphs-from-unstructured-text.pdf
          cp /tmp/bfs-ql-book/bfsql.pdf    deploy/books/bfs-ql.pdf
          cp -r /tmp/identity-book/docs/.  docs/identity-book/
          cp -r /tmp/kg-book/docs/.        docs/kg-book/
          cp -r /tmp/bfs-ql-book/docs/.    docs/bfs-ql-book/

      - name: Integrate books into docs site
        run: |
          pip install pyyaml
          python3 deploy/scripts/inject_book_nav.py \
            /tmp/identity-book/mkdocs.yml \
            mkdocs.yml \
            "The Identity Server" \
            identity-book
          python3 deploy/scripts/inject_book_nav.py \
            /tmp/kg-book/mkdocs.yml \
            mkdocs.yml \
            "Knowledge Graphs from Unstructured Text" \
            kg-book
          python3 deploy/scripts/inject_book_nav.py \
            /tmp/bfs-ql-book/mkdocs.yml \
            mkdocs.yml \
            "BFS-QL" \
            bfs-ql-book
          python3 deploy/scripts/update_books_links.py \
            docs/books.md

      - name: Build docs site
        run: |
          pip install mkdocs mkdocs-material
          mkdocs build

      - name: Copy docs site and books into deploy image context
        run: |
          cp -r deploy/books deploy/site/books

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        run: |
          docker build \
            -t $REGISTRY/kgraph-docs:${{ github.sha }} \
            -t $REGISTRY/kgraph-docs:latest \
            deploy/
          docker push $REGISTRY/kgraph-docs:${{ github.sha }}
          docker push $REGISTRY/kgraph-docs:latest

      - name: Build and push api+mcpserver image
        run: |
          docker build \
            -f kgserver/Dockerfile \
            -t $REGISTRY/kgraph-kgserver:${{ github.sha }} \
            -t $REGISTRY/kgraph-kgserver:latest \
            .
          docker push $REGISTRY/kgraph-kgserver:${{ github.sha }}
          docker push $REGISTRY/kgraph-kgserver:latest

      - name: Build and push gwchat image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_PATH=/chat \
            -t $REGISTRY/kgraph-gwchat:${{ github.sha }} \
            -t $REGISTRY/kgraph-gwchat:latest \
            gwchat/
          docker push $REGISTRY/kgraph-gwchat:${{ github.sha }}
          docker push $REGISTRY/kgraph-gwchat:latest

      - name: Build and push identity-server image
        run: |
          docker build \
            -t $REGISTRY/kgraph-identity-server:${{ github.sha }} \
            -t $REGISTRY/kgraph-identity-server:latest \
            identity-server/
          docker push $REGISTRY/kgraph-identity-server:${{ github.sha }}
          docker push $REGISTRY/kgraph-identity-server:latest

      - name: Build and push medlit-domain image
        run: |
          docker build \
            -f medlit/Dockerfile.domain-service \
            -t $REGISTRY/kgraph-medlit-domain:${{ github.sha }} \
            -t $REGISTRY/kgraph-medlit-domain:latest \
            .
          docker push $REGISTRY/kgraph-medlit-domain:${{ github.sha }}
          docker push $REGISTRY/kgraph-medlit-domain:latest

  # -------------------------------------------------------------------------
  # Deploy to staging — triggered by push to main
  # -------------------------------------------------------------------------
  deploy-staging:
    if: github.ref_type == 'branch'
    needs: build
    runs-on: ubuntu-latest
    environment: BuildEnv
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encode deploy files as base64
        run: |
          echo "_COMPOSE_B64=$(base64 -w0 deploy/docker-compose.prod.yml)" >> $GITHUB_ENV
          echo "_GWCHAT_CONFIG_B64=$(base64 -w0 deploy/gwchat-config/medlit.yaml)" >> $GITHUB_ENV
          echo "_NGINX_STAGING_B64=$(base64 -w0 deploy/nginx-staging.conf)" >> $GITHUB_ENV

      - name: Deploy to staging droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UMLS_API_KEY: ${{ secrets.UMLS_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          PASS1_LLM_BACKEND: ${{ vars.PASS1_LLM_BACKEND }}
          INGEST_PIPELINE_CLASS: ${{ vars.INGEST_PIPELINE_CLASS }}
          PUBLIC_MARKETING_SITE_URL: ${{ vars.PUBLIC_MARKETING_SITE_URL }}
          REGISTRY: ${{ vars.REGISTRY }}
          COMPOSE_B64: ${{ env._COMPOSE_B64 }}
          GWCHAT_CONFIG_B64: ${{ env._GWCHAT_CONFIG_B64 }}
          NGINX_STAGING_B64: ${{ env._NGINX_STAGING_B64 }}
        with:
          host: 137.184.49.99
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: POSTGRES_PASSWORD,ANTHROPIC_API_KEY,OPENAI_API_KEY,UMLS_API_KEY,LLM_PROVIDER,PASS1_LLM_BACKEND,INGEST_PIPELINE_CLASS,PUBLIC_MARKETING_SITE_URL,REGISTRY,GHCR_PAT,GHCR_USER,COMPOSE_B64,GWCHAT_CONFIG_B64,NGINX_STAGING_B64
          script: |
            set -e
            mkdir -p /opt/graphwright/gwchat-config

            echo "$COMPOSE_B64"       | base64 -d > /opt/graphwright/docker-compose.prod.yml
            echo "$GWCHAT_CONFIG_B64" | base64 -d > /opt/graphwright/gwchat-config/medlit.yaml
            echo "$NGINX_STAGING_B64" | base64 -d > /etc/nginx/sites-enabled/kgraph

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cat > /tmp/deploy.env <<EOF
            REGISTRY=$REGISTRY
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            OPENAI_API_KEY=$OPENAI_API_KEY
            UMLS_API_KEY=$UMLS_API_KEY
            LLM_PROVIDER=$LLM_PROVIDER
            PASS1_LLM_BACKEND=$PASS1_LLM_BACKEND
            INGEST_PIPELINE_CLASS=$INGEST_PIPELINE_CLASS
            PUBLIC_MARKETING_SITE_URL=$PUBLIC_MARKETING_SITE_URL
            EOF

            docker compose \
              --env-file /tmp/deploy.env \
              -f /opt/graphwright/docker-compose.prod.yml \
              up -d --pull always --remove-orphans

            rm -f /tmp/deploy.env
            nginx -t && nginx -s reload

  # -------------------------------------------------------------------------
  # Deploy to prod — triggered by version tag (v*)
  # -------------------------------------------------------------------------
  deploy-prod:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment: BuildEnv
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encode deploy files as base64
        run: |
          echo "_COMPOSE_B64=$(base64 -w0 deploy/docker-compose.prod.yml)" >> $GITHUB_ENV
          echo "_GWCHAT_CONFIG_B64=$(base64 -w0 deploy/gwchat-config/medlit.yaml)" >> $GITHUB_ENV
          echo "_NGINX_PROD_B64=$(base64 -w0 deploy/nginx-prod.conf)" >> $GITHUB_ENV

      - name: Deploy to prod droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UMLS_API_KEY: ${{ secrets.UMLS_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          PASS1_LLM_BACKEND: ${{ vars.PASS1_LLM_BACKEND }}
          INGEST_PIPELINE_CLASS: ${{ vars.INGEST_PIPELINE_CLASS }}
          PUBLIC_MARKETING_SITE_URL: ${{ vars.PUBLIC_MARKETING_SITE_URL }}
          REGISTRY: ${{ vars.REGISTRY }}
          COMPOSE_B64: ${{ env._COMPOSE_B64 }}
          GWCHAT_CONFIG_B64: ${{ env._GWCHAT_CONFIG_B64 }}
          NGINX_PROD_B64: ${{ env._NGINX_PROD_B64 }}
        with:
          host: 104.131.171.175
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: POSTGRES_PASSWORD,ANTHROPIC_API_KEY,OPENAI_API_KEY,UMLS_API_KEY,LLM_PROVIDER,PASS1_LLM_BACKEND,INGEST_PIPELINE_CLASS,PUBLIC_MARKETING_SITE_URL,REGISTRY,GHCR_PAT,GHCR_USER,COMPOSE_B64,GWCHAT_CONFIG_B64,NGINX_PROD_B64
          script: |
            set -e
            mkdir -p /opt/graphwright/gwchat-config

            echo "$COMPOSE_B64"      | base64 -d > /opt/graphwright/docker-compose.prod.yml
            echo "$GWCHAT_CONFIG_B64" | base64 -d > /opt/graphwright/gwchat-config/medlit.yaml
            echo "$NGINX_PROD_B64"   | base64 -d > /etc/nginx/sites-enabled/kgraph

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cat > /tmp/deploy.env <<EOF
            REGISTRY=$REGISTRY
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            OPENAI_API_KEY=$OPENAI_API_KEY
            UMLS_API_KEY=$UMLS_API_KEY
            LLM_PROVIDER=$LLM_PROVIDER
            PASS1_LLM_BACKEND=$PASS1_LLM_BACKEND
            INGEST_PIPELINE_CLASS=$INGEST_PIPELINE_CLASS
            PUBLIC_MARKETING_SITE_URL=$PUBLIC_MARKETING_SITE_URL
            EOF

            docker compose \
              --env-file /tmp/deploy.env \
              -f /opt/graphwright/docker-compose.prod.yml \
              up -d --pull always --remove-orphans

            rm -f /tmp/deploy.env
            nginx -t && nginx -s reload
