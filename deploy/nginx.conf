# Containerized nginx — proxy_pass targets use Docker service names.
# SSL certificates are managed by the certbot service via shared volumes.
# ACME challenge files are served from the acme-challenge volume.
#
# Routing:
#   /              → docs (MkDocs static site)
#   /api/          → api (kgserver REST)
#   /docs /redoc /openapi.json /graphql /graphiql /health /graph-viz/ → api
#   /sse /mcp/ /messages/ → mcpserver (SSE + MCP)
# gwchat is excluded per architecture decision (domain-microservice branch).
# medlit-domain is internal only — no public route.

server {
    listen 80;
    server_name graphwright.io www.graphwright.io;

    # Let's Encrypt ACME challenge — served from shared volume
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Return 404 (not redirect) for well-known discovery so MCP clients don't
    # get bounced to HTTPS and hit the self-signed cert before reaching /sse.
    location /.well-known/ {
        return 404;
    }

    # MCP endpoints served over plain HTTP so Claude Code / Cursor can connect
    # even when TLS uses a self-signed cert (e.g. before certbot obtains a real cert).
    location /sse {
        proxy_pass http://mcpserver:8001/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /mcp/ {
        proxy_pass http://mcpserver:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /messages/ {
        proxy_pass http://mcpserver:8001/messages/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://graphwright.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.graphwright.io;

    ssl_certificate /etc/letsencrypt/live/graphwright.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphwright.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://graphwright.io$request_uri;
}

server {
    listen 443 ssl;
    server_name graphwright.io;

    ssl_certificate /etc/letsencrypt/live/graphwright.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphwright.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    # MCP server (SSE) — required for Cursor/Claude Code
    location /mcp/ {
        proxy_pass http://mcpserver:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /sse {
        proxy_pass http://mcpserver:8001/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /messages/ {
        proxy_pass http://mcpserver:8001/messages/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
