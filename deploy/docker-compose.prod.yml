services:
  docs:
    image: ${REGISTRY}/docs:latest
    environment:
      CHAT_UPSTREAM: http://gwchat:3000
    depends_on:
      gwchat:
        condition: service_started
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8000"
    networks:
      - gw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  api:
    image: ${REGISTRY}/kgserver:latest
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kgserver
      BUNDLE_PATH: /bundle
      MCP_SSE_URL: http://mcpserver:8001/sse
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      IDENTITY_SERVER_URL: http://identity-server:8080
      PUBLIC_MARKETING_SITE_URL: ${PUBLIC_MARKETING_SITE_URL:-https://graphwright.io/}
      KGSERVER_SERVE_MKDOCS_SITE: "false"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - bundle:/bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      bundle-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - gw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcpserver:
    image: ${REGISTRY}/kgserver:latest
    command: ["python", "-m", "uvicorn", "mcp_main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kgserver
      BUNDLE_PATH: /bundle
      PASS1_LLM_BACKEND: ${PASS1_LLM_BACKEND:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://redis:6379
      IDENTITY_SERVER_URL: http://identity-server:8080
      INGEST_PIPELINE_CLASS: ${INGEST_PIPELINE_CLASS:-}
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - bundle:/bundle:ro
      - ingest_workspace:/app/ingest_workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bundle-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - gw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gwchat:
    image: ${REGISTRY}/gwchat:latest
    environment:
      MCP_SSE_URL: http://mcpserver:8001/sse
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-claude-haiku-4-5-20251001}
      SYNTHESIS_MODEL: ${SYNTHESIS_MODEL:-claude-sonnet-4-6}
      GWCHAT_CONFIG: /app/config/medlit.yaml
      MCP_CONNECT_TIMEOUT: "25"
      LLM_MIN_REQUEST_INTERVAL_SECONDS: "3.0"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./deploy/gwchat-config:/app/config:ro
    depends_on:
      mcpserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gw-network

  identity-server:
    image: ${REGISTRY}/identity-server:latest
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kgserver
      REDIS_URL: redis://redis:6379
      DOMAIN_SERVICE_URL: http://medlit-domain:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      medlit-domain:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  medlit-domain:
    image: ${REGISTRY}/medlit-domain:latest
    environment:
      UMLS_API_KEY: ${UMLS_API_KEY:-}
      CANONICAL_ID_CACHE_PATH: /data/canonical_id_cache.json
    volumes:
      - canonical_id_cache:/data
    restart: unless-stopped
    networks:
      - gw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  bundle-init:
    image: alpine:latest
    volumes:
      - bundle:/bundle
    command: |
      sh -c "[ -f /bundle/manifest.json ] && echo 'bundle already present, skipping' && exit 0; echo 'downloading bundle...'; apk add --no-cache curl && curl -fsSL https://github.com/graphwright/medlit_bundle/releases/latest/download/bundle.tar.gz | tar -xz -C /bundle"
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kgserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kgserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gw-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - gw-network

volumes:
  pgdata:
    driver: local
  bundle:
    driver: local
  ingest_workspace:
    driver: local
  canonical_id_cache:
    driver: local

networks:
  gw-network:
    driver: bridge
