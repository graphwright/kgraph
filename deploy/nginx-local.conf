# Local nginx example for docker-compose dev use.
# Uses Docker service names; no SSL, no gwchat.
# Routing: / → docs:8000 | /api/ /docs /graphql … → api:8000 | /sse /mcp/ /messages/ → mcpserver:8001

server {
    listen 80;
    server_name localhost;

    location /sse {
        proxy_pass http://mcpserver:8001/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /mcp/ {
        proxy_pass http://mcpserver:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /messages/ {
        proxy_pass http://mcpserver:8001/messages/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /chat {
        proxy_pass http://gwchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /graphql {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /graphiql {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /graph-viz/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://docs:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
